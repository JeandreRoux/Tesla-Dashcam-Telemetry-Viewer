name: macOS App

'on':
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main
      - 'feature/**'

jobs:
  build-macos-app:
    name: Build macOS portable app
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install package and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pyinstaller

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Verify desktop command
        run: teslacam-telemetry-ui --help

      - name: Build portable macOS app
        run: ./scripts/build_macos.sh

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: TeslaCamTelemetry-macos-portable
          path: dist/macos-artifact/
          if-no-files-found: error
